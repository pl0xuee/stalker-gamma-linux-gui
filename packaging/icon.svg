<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Zone deployment kit icon: anomaly-amber trefoil on dark olive, stencil cut -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#232D26"/>
      <stop offset="70%" stop-color="#161C18"/>
      <stop offset="100%" stop-color="#101412"/>
    </radialGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4B95A"/>
      <stop offset="100%" stop-color="#DE9430"/>
    </linearGradient>
  </defs>

  <rect x="8" y="8" width="240" height="240" rx="52" fill="url(#glow)"
        stroke="#2C362E" stroke-width="4"/>

  <!-- trefoil: three annular blades, 60° wide, centered at 90°/210°/330° -->
  <g transform="translate(128,128)">
    <g fill="url(#amber)">
      <path d="M -34.5,-59.75 A 69 69 0 0 1 34.5,-59.75 L 19,-32.9 A 38 38 0 0 0 -19,-32.9 Z"/>
      <path d="M -34.5,-59.75 A 69 69 0 0 1 34.5,-59.75 L 19,-32.9 A 38 38 0 0 0 -19,-32.9 Z"
            transform="rotate(120)"/>
      <path d="M -34.5,-59.75 A 69 69 0 0 1 34.5,-59.75 L 19,-32.9 A 38 38 0 0 0 -19,-32.9 Z"
            transform="rotate(240)"/>
      <circle r="17" cx="0" cy="0"/>
    </g>
    <!-- stencil ticks: break the ring like a worn hazard decal -->
    <g stroke="#161C18" stroke-width="7">
      <line x1="0" y1="-76" x2="0" y2="-26"/>
      <line x1="-65.8" y1="38" x2="-22.5" y2="13"/>
      <line x1="65.8" y1="38" x2="22.5" y2="13"/>
    </g>
  </g>

  <!-- corner data tick, PDA vibe -->
  <g fill="#8A9484">
    <rect x="196" y="212" width="8" height="12"/>
    <rect x="208" y="206" width="8" height="18"/>
    <rect x="220" y="200" width="8" height="24"/>
  </g>
</svg>
