name: Build AppImage

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

# Least privilege by default; only the release job opts into write.
permissions:
  contents: read

jobs:
  appimage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Install .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 10.0.x

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Build AppImage
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          chmod +x scripts/build-appimage.sh scripts/setup-deps.sh packaging/StalkerGammaGui.AppDir/AppRun
          scripts/build-appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: StalkerGammaGui-x86_64
          path: StalkerGammaGui-x86_64.AppImage
          compression-level: 0

  # Separate job so write permission is granted only for tag builds that publish a release.
  release:
    needs: appimage
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Download artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: StalkerGammaGui-x86_64

      - name: Extract changelog for this tag
        id: changelog
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          # Pull the section between this version's heading and the next "## " heading.
          notes="$(awk -v tag="## $tag" '
            $0 == tag {grab=1; next}
            grab && /^## / {exit}
            grab {print}
          ' CHANGELOG.md)"
          if [[ -z "${notes//[[:space:]]/}" ]]; then
            echo "No CHANGELOG.md section for $tag; falling back to auto-generated notes." >&2
            echo "have_notes=false" >> "$GITHUB_OUTPUT"
          else
            {
              echo "notes<<EOF"
              echo "$notes"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "have_notes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: StalkerGammaGui-x86_64.AppImage
          body: ${{ steps.changelog.outputs.have_notes == 'true' && steps.changelog.outputs.notes || '' }}
          generate_release_notes: ${{ steps.changelog.outputs.have_notes != 'true' }}
